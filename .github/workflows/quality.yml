name: Quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      # zizmorcore/* is not in the ref-pin allowlist, so the action is hash-pinned.
      # version pins the zizmor CLI to the org-standard version.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0 # full history for the secret scan
          persist-credentials: false

      # gitleaks CLI (MIT) pinned by version and verified by checksum.
      # NOTE: not managed by Dependabot - bump GITLEAKS_VERSION + GITLEAKS_SHA256 by hand.
      - name: Install gitleaks (pinned + checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" -o "${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        shell: bash
        run: |
          set -euo pipefail
          gitleaks git . --redact --verbose
