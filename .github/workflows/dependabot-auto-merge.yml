name: Dependabot auto-merge

# Auto-merges Dependabot PRs for SECURITY and PATCH updates only.
# Minor/major bumps stay as PRs for manual review and tagging.
on: pull_request

# The merge runs under the MEBBOT PAT (see below), so GITHUB_TOKEN only needs
# read for fetch-metadata. The PAT is required because a push made with the
# default GITHUB_TOKEN does NOT trigger other workflows (move-major-tag).
permissions:
  contents: read
  pull-requests: read

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      # dependabot/* is not in the ref-pin allowlist, so it is hash-pinned.
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ghsa-id is set when the PR resolves a security advisory.
      # update-type is the semver bump kind for plain version updates.
      - name: Enable auto-merge (security or patch)
        if: steps.meta.outputs.ghsa-id != '' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Fine-grained PAT of the MeblabsBot account, stored as a *Dependabot*
          # secret (Dependabot runs don't see normal Actions secrets). Using it
          # here makes the merge push trigger the move-major-tag workflow.
          GH_TOKEN: ${{ secrets.MEBBOT }}
