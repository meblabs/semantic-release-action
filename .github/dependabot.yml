version: 2
updates:
  # Keep the actions used by this composite action up to date.
  # Dependabot tracks the concrete version behind each major tag (v6, ...)
  # and opens a PR when a new release (including security patches) is available.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # `fix:` so security bumps are merged and the latest major tag (e.g. v3)
      # can be moved to the new commit by the "move-major-tag" workflow.
      prefix: "fix"
      prefix-development: "fix"
