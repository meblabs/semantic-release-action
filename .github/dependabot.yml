version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait before adopting freshly-published versions (supply-chain safety).
    # Security updates are NOT subject to cooldown, so security PRs stay immediate.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
